<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CubeFeet Measurement</title>

<style>
* {
  box-sizing: border-box;
  font-family: "Inter", "Segoe UI", Arial, sans-serif;
}

/* ================= BACKGROUND ================= */
body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
    url("{{ url_for('static', filename='timber.jpg') }}");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  padding: 30px;
  color: #f5f5f5;
}

/* ================= LAYOUT ================= */
.container {
  max-width: 1300px;
  margin: auto;
}

.content {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 28px;
}

/* ================= CARD ================= */
.table-wrapper {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 14px;
  padding: 22px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.35);
  position: relative;
}

/* ================= REMOVE TABLE ================= */
.remove-table-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  background: transparent;
  border: 1px solid #ff6b6b;
  color: #ff6b6b;
  padding: 4px 10px;
  font-size: 12px;
  border-radius: 20px;
  cursor: pointer;
}

/* ================= TABLE NAME ================= */
.table-name {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.5);
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  padding: 8px 4px;
  margin-bottom: 18px;
}

/* ================= TABLE ================= */
table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: rgba(255,255,255,0.15);
  font-weight: 500;
  padding: 10px;
  font-size: 14px;
}

td {
  padding: 8px;
  text-align: center;
}

/* ================= INPUTS ================= */
input[type="number"] {
  width: 90px;
  padding: 7px;
  font-size: 14px;
  background: rgba(255,255,255,0.9);
  border: none;
  border-radius: 6px;
  text-align: center;
}

/* REMOVE NUMBER ARROWS */
input::-webkit-inner-spin-button,
input::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
input[type=number] {
  -moz-appearance: textfield;
}

/* ================= REMOVE ROW ================= */
.remove-btn {
  background: transparent;
  border: none;
  color: #ff6b6b;
  font-size: 18px;
  cursor: pointer;
}

/* ================= ADD ROW BUTTON ================= */
.actions-left {
  display: flex;
  justify-content: flex-start;
  margin-top: 10px;
}

.add-dotted {
  background: transparent;
  border: 1px dashed #ffd369;
  color: #ffd369;
  padding: 6px 18px;
  border-radius: 999px;
  cursor: pointer;
  font-size: 13px;
}

/* ================= PRICE TABLE ================= */
.price-table {
  width: 100%;
  margin-top: 12px;
}

.price-table td {
  padding: 6px;
}

.spacer {
  width: 30px;
}

/* ================= ADD TABLE ================= */
.add-table-wrapper {
  text-align: center;
  margin-top: 35px;
}

.add-table-btn {
  background: #ffd369;
  color: #000;
  font-weight: 600;
  padding: 14px 36px;
  font-size: 15px;
  border-radius: 40px;
  border: none;
}

/* ================= CALCULATE ================= */
.calculate-wrapper {
  text-align: center;
  margin-top: 40px;
}

.calculate-btn {
  background: #ffffff;
  color: #000;
  padding: 14px 42px;
  font-size: 16px;
  border-radius: 40px;
  font-weight: 600;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="content" id="contentArea"></div>

  <div class="add-table-wrapper">
    <button id="addTableBtn" class="add-table-btn" onclick="createTable()">Add Table</button>
  </div>

  <div class="calculate-wrapper">
    <button class="calculate-btn" onclick="submitData()">Calculate Total</button>
  </div>

</div>

<script>
let tableCount = 0;
const maxTables = 3;

function updateAddTableVisibility() {
  document.getElementById('addTableBtn').style.display =
    tableCount >= maxTables ? 'none' : 'inline-block';
}

/* ================= PRICE ROW ================= */
function createPriceRow(isLabel = false) {
  const tr = document.createElement('tr');

  if (isLabel) {
    tr.innerHTML = `
      <td style="font-size:13px;">Inches</td>
      <td class="spacer"></td>
      <td style="font-size:13px;">Amount</td>
      <td style="font-size:13px;">Amount</td>
      <td></td>
    `;
    return tr;
  }

  tr.innerHTML = `
    <td><input type="number" min="0"></td>
    <td class="spacer"></td>
    <td><input type="number" min="0"></td>
    <td><input type="number" min="0"></td>
    <td>
      <button class="remove-btn" onclick="this.closest('tr').remove()">✕</button>
    </td>
  `;
  return tr;
}

/* ================= MEASUREMENT ROW ================= */
function createRow() {
  const row = document.createElement('tr');
  row.innerHTML = `
    <td><input type="number" min="0"></td>
    <td><input type="number" min="0" max="11"></td>
    <td><button class="remove-btn" onclick="this.closest('tr').remove()">✕</button></td>
  `;
  return row;
}

function createTable() {
  if (tableCount >= maxTables) return;

  const wrapper = document.createElement('div');
  wrapper.className = 'table-wrapper';

  const removeTableBtn = document.createElement('button');
  removeTableBtn.className = 'remove-table-btn';
  removeTableBtn.textContent = 'Remove Table';
  removeTableBtn.onclick = () => {
    if (confirm('Remove this table?')) {
      wrapper.remove();
      tableCount--;
      updateAddTableVisibility();
    }
  };

  const tableName = document.createElement('input');
  tableName.className = 'table-name';
  tableName.placeholder = 'Enter table name';

  const table = document.createElement('table');
  table.innerHTML = `
    <thead>
      <tr>
        <th>Feet</th>
        <th>Inches</th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
  `;

  const tbody = table.querySelector('tbody');
  tbody.appendChild(createRow());

  const measureActions = document.createElement('div');
  measureActions.className = 'actions-left';

  const addRowBtn = document.createElement('button');
  addRowBtn.className = 'add-dotted';
  addRowBtn.textContent = '+';
  addRowBtn.onclick = () => tbody.appendChild(createRow());

  measureActions.appendChild(addRowBtn);

  const priceTable = document.createElement('table');
  priceTable.className = 'price-table';
  const priceBody = document.createElement('tbody');

  priceBody.appendChild(createPriceRow(true));
  priceBody.appendChild(createPriceRow(false));

  priceTable.appendChild(priceBody);

  const priceAdd = document.createElement('div');
  priceAdd.className = 'actions-left';

  const addPriceBtn = document.createElement('button');
  addPriceBtn.className = 'add-dotted';
  addPriceBtn.textContent = '+';
  addPriceBtn.onclick = () => priceBody.appendChild(createPriceRow(false));

  priceAdd.appendChild(addPriceBtn);

  wrapper.append(
    removeTableBtn,
    tableName,
    table,
    measureActions,
    priceTable,
    priceAdd
  );

  document.getElementById('contentArea').appendChild(wrapper);

  tableCount++;
  updateAddTableVisibility();
}

/* ================= SUBMIT DATA (FIXED) ================= */
function submitData() {
  const tables = [];

  document.querySelectorAll(".table-wrapper").forEach(wrapper => {
    const name = wrapper.querySelector(".table-name").value || "Untitled Table";

    const rows = [];
    wrapper.querySelector("table tbody").querySelectorAll("tr").forEach(tr => {
      const inputs = tr.querySelectorAll("input");
      if (inputs.length >= 2 && inputs[0].value && inputs[1].value) {
        rows.push({
          feet: inputs[0].value,
          inch: inputs[1].value
        });
      }
    });

    const prices = [];
    wrapper.querySelector(".price-table tbody").querySelectorAll("tr").forEach((tr, i) => {
      if (i === 0) return;
      const inputs = tr.querySelectorAll("input");
      if (inputs.length === 3 && inputs[0].value) {
        prices.push({
          feet: inputs[0].value,
          amount1: inputs[1].value,
          amount2: inputs[2].value
        });
      }
    });

    tables.push({ name, rows, prices });
  });

  fetch("/timberresult", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ tables })
  })
  .then(res => res.text())
  .then(html => {
    document.open();
    document.write(html);
    document.close();
  });
}

createTable();
updateAddTableVisibility();
</script>

</body>
</html>
